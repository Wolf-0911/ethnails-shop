{% extends 'blog/base.html' %}

{% block title %}{{ post.title }}{% endblock %}

{% block content %}

    <h1>{{ post.title }}</h1>
    <p class="date">
        Published {{ post.publish }} by {{ post.author }}

        Slug {{ post.slug }} {{ post.status }}
    </p>
    {{ post.body|linebreaks }}
{% endblock %}
